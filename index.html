<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Movie Date for Christine</title>
<style>
  :root {
    --gold: #d4af6a;
    --rose: #e8a7b8;
    --deep: #1a1024;
    --cream: #fdf6ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: radial-gradient(ellipse at top, #2a1838 0%, var(--deep) 55%, #0d0714 100%);
    color: var(--cream);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  /* floating film/heart specks */
  .speck {
    position: fixed;
    top: -40px;
    color: var(--gold);
    opacity: 0.5;
    font-size: 18px;
    animation: fall linear infinite;
    pointer-events: none;
    user-select: none;
  }
  @keyframes fall {
    0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .card {
    position: relative;
    width: min(92vw, 560px);
    margin: 48px 16px;
    padding: 48px 38px 42px;
    background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(212,175,106,0.35);
    border-radius: 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55), inset 0 0 60px rgba(212,175,106,0.05);
    backdrop-filter: blur(6px);
    text-align: center;
    animation: rise 1s ease-out both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(30px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .ticket-tag {
    display: inline-block;
    letter-spacing: 0.35em;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(212,175,106,0.4);
    border-radius: 999px;
    padding: 7px 18px;
    margin-bottom: 26px;
  }

  h1 {
    font-size: clamp(30px, 7vw, 46px);
    font-weight: normal;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  h1 .name {
    color: var(--rose);
    font-style: italic;
  }
  .sub {
    font-size: 16px;
    opacity: 0.8;
    margin-bottom: 30px;
  }

  .poster {
    margin: 8px auto 28px;
    width: 210px;
    height: auto;
    display: block;
    border-radius: 12px;
    border: 1px solid rgba(212,175,106,0.4);
    box-shadow: 0 18px 40px rgba(0,0,0,0.5);
  }

  .details {
    text-align: left;
    margin: 0 auto 30px;
    max-width: 360px;
  }
  .detail-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 4px;
    border-bottom: 1px dashed rgba(212,175,106,0.25);
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .ico { font-size: 20px; width: 26px; text-align: center; }
  .detail-row .lbl {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.6;
  }
  .detail-row .val { font-size: 17px; }

  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  button {
    font-family: inherit;
    font-size: 16px;
    padding: 13px 26px;
    border-radius: 999px;
    cursor: pointer;
    border: 1px solid var(--gold);
    transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  button:active { transform: scale(0.96); }
  .yes {
    background: linear-gradient(135deg, var(--rose), var(--gold));
    color: var(--deep);
    font-weight: bold;
    box-shadow: 0 10px 24px rgba(232,167,184,0.35);
  }
  .yes:hover { box-shadow: 0 14px 30px rgba(232,167,184,0.5); }
  .maybe {
    background: transparent;
    color: var(--cream);
  }
  .maybe:hover { background: rgba(255,255,255,0.06); }

  .answer {
    margin-top: 26px;
    min-height: 26px;
    font-size: 19px;
    color: var(--rose);
    font-style: italic;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .answer.show { opacity: 1; }

  .footer {
    margin-top: 30px;
    font-size: 12px;
    letter-spacing: 0.15em;
    opacity: 0.45;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="ticket-tag">Admit Two &middot; Date Night</span>
    <h1>Christine, will you<br>be my date?</h1>
    <p class="sub">I&rsquo;ve already picked the film. All I need is you. 💛</p>

    <img class="poster" src="colony.webp" alt="Colony movie poster" />

    <div class="details">
      <div class="detail-row">
        <span class="ico">🎬</span>
        <div><div class="lbl">Movie</div><div class="val">Colony (콜로니)</div></div>
      </div>
      <div class="detail-row">
        <span class="ico">📅</span>
        <div><div class="lbl">When</div><div class="val">Tomorrow &middot; 1:25 PM</div></div>
      </div>
      <div class="detail-row">
        <span class="ico">📍</span>
        <div><div class="lbl">Where</div><div class="val">Jurong Point</div></div>
      </div>
    </div>

    <div class="actions">
      <button class="yes" onclick="sayYes()">Yes, it&rsquo;s a date! 💕</button>
      <button class="maybe" onclick="playHard()">Hmm, convince me</button>
    </div>

    <div class="answer" id="answer"></div>

    <div class="footer">WITH LOVE, ALWAYS</div>
  </div>

<script>
  // floating specks
  const symbols = ['❤', '🎬', '✦', '🍿', '💛'];
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div');
    s.className = 'speck';
    s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = (12 + Math.random() * 16) + 'px';
    s.style.animationDuration = (7 + Math.random() * 8) + 's';
    s.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(s);
  }

  const answer = document.getElementById('answer');

  function sayYes() {
    answer.textContent = 'Yay! Pick you up soon. I can’t wait. 🥰🍿';
    answer.classList.add('show');
    burst();
  }

  const teases = [
    'There’s popcorn. Buttered. Your favourite. 🍿',
    'I’ll hold your hand through the scary parts. 🤝',
    'Dinner after is on me too. 😉',
    'Okay fine — I’ll let you pick the snacks. 🍫',
    'Just say yes already, I miss you. 💛'
  ];
  let t = 0;
  function playHard() {
    answer.textContent = teases[t % teases.length];
    answer.classList.add('show');
    t++;
  }

  function burst() {
    for (let i = 0; i < 30; i++) {
      const h = document.createElement('div');
      h.textContent = '❤';
      h.style.position = 'fixed';
      h.style.left = '50%';
      h.style.top = '60%';
      h.style.fontSize = (14 + Math.random() * 22) + 'px';
      h.style.color = Math.random() > 0.5 ? '#e8a7b8' : '#d4af6a';
      h.style.pointerEvents = 'none';
      h.style.zIndex = 999;
      document.body.appendChild(h);
      const angle = Math.random() * Math.PI * 2;
      const dist = 120 + Math.random() * 220;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      h.animate([
        { transform: 'translate(-50%,-50%) scale(0.4)', opacity: 1 },
        { transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(1.2)`, opacity: 0 }
      ], { duration: 1100 + Math.random() * 600, easing: 'cubic-bezier(.2,.7,.3,1)' });
      setTimeout(() => h.remove(), 1800);
    }
  }
</script>
</body>
</html>
